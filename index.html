<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Elementary Math Practice</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Elementary Math Practice</h1>
      <p class="subtitle">Choose your grade, then pick a topic. Questions are generated on the fly and checked instantly.</p>
    </header>

    <main>
      <section id="home" class="screen active" aria-label="Home">
        <div id="grade-select" class="grade-select" role="region" aria-label="Choose grade">
          <h2 class="subtitle" style="margin-bottom:12px">Choose a grade</h2>
          <div class="grade-cards">
            <button id="grade-k-btn" class="grade-btn grade-k" data-grade="k" type="button">Kindergarten</button>
            <button id="grade-1-btn" class="grade-btn grade-1" data-grade="1" type="button">Grade 1</button>
            <button id="grade-4-btn" class="grade-btn" data-grade="4" type="button">Grade 4</button>
            <button id="grade-5-btn" class="grade-btn grade-5" data-grade="5" type="button">Grade 5</button>
          </div>
        </div>

        <div id="topics-grade4" class="cards hidden" role="list" aria-label="Grade 4 topics">
          <nav class="nav topics-nav">
            <button id="back-to-select" class="icon-btn" type="button" aria-label="Choose Grade" title="Choose Grade">🏠</button>
          </nav>
          <button class="topic-btn" data-topic="fractions" role="listitem" aria-label="Fractions">Fractions</button>
          <button class="topic-btn" data-topic="mixed-fractions" role="listitem" aria-label="Mixed Fractions">Mixed Fractions</button>
          <button class="topic-btn" data-topic="addition" role="listitem" aria-label="Addition">Addition</button>
          <button class="topic-btn" data-topic="subtraction" role="listitem" aria-label="Subtraction">Subtraction</button>
          <button class="topic-btn" data-topic="multiplication" role="listitem" aria-label="Multiplication">Multiplication</button>
          <button class="topic-btn" data-topic="division" role="listitem" aria-label="Division">Division</button>
        </div>

        <div id="topics-grade1" class="cards hidden" role="list" aria-label="Grade 1 topics">
          <nav class="nav topics-nav">
            <button id="back-to-select-1" class="icon-btn" type="button" aria-label="Choose Grade" title="Choose Grade">🏠</button>
          </nav>
          <button class="topic-btn" data-topic="addition-g1" role="listitem" aria-label="Addition (Grade 1)">➕ Addition</button>
          <button class="topic-btn" data-topic="subtraction-g1" role="listitem" aria-label="Subtraction (Grade 1)">➖ Subtraction</button>
          <button class="topic-btn" data-topic="word-problems-g1" role="listitem" aria-label="Word Problems - Addition (Grade 1)">📖 Word Problems +</button>
          <button class="topic-btn" data-topic="subtraction-word-problems-g1" role="listitem" aria-label="Word Problems - Subtraction (Grade 1)">📖 Word Problems −</button>
        </div>


        <div id="topics-kindergarten" class="cards hidden" role="list" aria-label="Kindergarten topics">
          <nav class="nav topics-nav">
            <button id="back-to-select-k" class="icon-btn" type="button" aria-label="Choose Grade" title="Choose Grade">🏠</button>
          </nav>
          <button class="topic-btn" data-topic="counting-k" role="listitem" aria-label="Counting">🔢 Counting</button>
          <button class="topic-btn" data-topic="addition-k" role="listitem" aria-label="Addition">➕ Addition</button>
          <button class="topic-btn" data-topic="sight-words" role="listitem" aria-label="Sight Words">📖 Sight Words</button>
        </div>

        <div id="topics-grade5" class="cards hidden" role="list" aria-label="Grade 5 topics">
          <nav class="nav topics-nav">
            <button id="back-to-select-5" class="icon-btn" type="button" aria-label="Choose Grade" title="Choose Grade">🏠</button>
          </nav>
          <button class="section-btn" data-section="adding-decimals" role="listitem" aria-label="Adding decimals">Adding decimals</button>
          <button class="section-btn" data-section="subtracting-decimals" role="listitem" aria-label="Subtracting decimals">Subtracting decimals</button>
          <button class="section-btn" data-section="multiply-decimals-powers" role="listitem" aria-label="Multiply decimals by 10, 100 or 1,000">Multiply by 10, 100, 1,000</button>
          <button class="section-btn" data-section="multiply-decimals-whole" role="listitem" aria-label="Multiply decimals by whole numbers">Multiply decimals × whole numbers</button>
          <button class="section-btn" data-section="multiply-decimals-decimals" role="listitem" aria-label="Multiply decimals by decimals">Multiply decimals × decimals</button>
          <button class="section-btn" data-section="multiply-columns" role="listitem" aria-label="Multiply in columns">Multiply in columns</button>
          <button class="section-btn" data-section="addition-advanced" role="listitem" aria-label="Addition (advanced)">Addition (advanced)</button>
          <button class="section-btn" data-section="subtraction-advanced" role="listitem" aria-label="Subtraction (advanced)">Subtraction (advanced)</button>
          <button class="section-btn" data-section="word-problems-g5" role="listitem" aria-label="Word Problems">Word Problems</button>
        </div>

        <!-- Grade 5 Sub-sections -->
        <div id="subsections-adding-decimals" class="cards hidden" role="list" aria-label="Adding decimals sub-sections">
          <nav class="nav topics-nav">
            <button id="back-to-grade5-from-adding" class="icon-btn" type="button" aria-label="Back to Grade 5" title="Back to Grade 5">⬅️</button>
          </nav>
          <button class="topic-btn" data-topic="add-decimals" role="listitem">Add 1-place decimals (e.g., 3.4 + 5.7)</button>
          <button class="topic-btn" data-topic="add-decimals-missing" role="listitem">Add 1-place decimals (missing addend)</button>
          <button class="topic-btn" data-topic="add-2digit-decimals" role="listitem">Add hundredths (e.g., 0.23 + 0.45)</button>
          <button class="topic-btn" data-topic="add-3digit-decimals" role="listitem">Add thousandths (e.g., 0.123 + 0.456)</button>
          <button class="topic-btn" data-topic="add-2digit-missing" role="listitem">Add hundredths (missing addend)</button>
          <button class="topic-btn" data-topic="add-2digit-missing-harder" role="listitem">Add hundredths (missing, harder)</button>
          <button class="topic-btn" data-topic="add-columns" role="listitem">Add in columns</button>
        </div>

        <div id="subsections-subtracting-decimals" class="cards hidden" role="list" aria-label="Subtracting decimals sub-sections">
          <nav class="nav topics-nav">
            <button id="back-to-grade5-from-subtracting" class="icon-btn" type="button" aria-label="Back to Grade 5" title="Back to Grade 5">⬅️</button>
          </nav>
          <button class="topic-btn" data-topic="subtract-decimals" role="listitem">Subtract 1-place decimals (e.g., 5.4 − 0.7)</button>
          <button class="topic-btn" data-topic="subtract-decimals-missing" role="listitem">Subtract 1-place decimals (missing subtrahend)</button>
          <button class="topic-btn" data-topic="subtract-2digit-decimals" role="listitem">Subtract hundredths (missing minuend)</button>
          <button class="topic-btn" data-topic="subtract-from-whole" role="listitem">Subtract from a whole number</button>
          <button class="topic-btn" data-topic="subtract-columns" role="listitem">Subtract in columns</button>
        </div>

        <div id="subsections-multiply-decimals-powers" class="cards hidden" role="list" aria-label="Multiply decimals by powers sub-sections">
          <nav class="nav topics-nav">
            <button id="back-to-grade5-from-powers" class="icon-btn" type="button" aria-label="Back to Grade 5" title="Back to Grade 5">⬅️</button>
          </nav>
          <button class="topic-btn" data-topic="multiply-by-10-100" role="listitem">Multiply decimals by 10 or 100</button>
          <button class="topic-btn" data-topic="multiply-by-10-100-1000" role="listitem">Multiply decimals by 10, 100 or 1,000</button>
          <button class="topic-btn" data-topic="multiply-3digit-by-powers" role="listitem">Multiply 3-digit decimals by 10, 100, or 1000</button>
          <button class="topic-btn" data-topic="multiply-powers-missing" role="listitem">Multiply by 10, 100 or 1,000 (missing factors)</button>
          <button class="topic-btn" data-topic="multiply-3digit-missing" role="listitem">Multiply 3-digit decimals (missing factors)</button>
        </div>

        <div id="subsections-multiply-decimals-whole" class="cards hidden" role="list" aria-label="Multiply decimals by whole numbers sub-sections">
          <nav class="nav topics-nav">
            <button id="back-to-grade5-from-whole" class="icon-btn" type="button" aria-label="Back to Grade 5" title="Back to Grade 5">⬅️</button>
          </nav>
          <button class="topic-btn" data-topic="whole-x-1digit-decimal" role="listitem">Whole number × 1-digit decimal</button>
          <button class="topic-btn" data-topic="whole-x-1-2digit-decimal" role="listitem">Whole number × 1-2 digit decimal</button>
          <button class="topic-btn" data-topic="whole-x-1-2digit-harder" role="listitem">Whole number × 1-2 digit decimal (harder)</button>
          <button class="topic-btn" data-topic="whole-x-decimal-missing" role="listitem">Whole numbers × decimals (missing factors)</button>
          <button class="topic-btn" data-topic="whole-x-2digit-missing" role="listitem">Whole numbers × 2-digit decimals (missing factors)</button>
        </div>

        <div id="subsections-multiply-decimals-decimals" class="cards hidden" role="list" aria-label="Multiply decimals by decimals sub-sections">
          <nav class="nav topics-nav">
            <button id="back-to-grade5-from-decimals" class="icon-btn" type="button" aria-label="Back to Grade 5" title="Back to Grade 5">⬅️</button>
          </nav>
          <button class="topic-btn" data-topic="multiply-decimal-by-decimal" role="listitem">Multiply a decimal by decimal</button>
          <button class="topic-btn" data-topic="multiply-decimals-missing" role="listitem">Multiply decimals (missing factors)</button>
        </div>

        <div id="subsections-multiply-columns" class="cards hidden" role="list" aria-label="Multiply in columns sub-sections">
          <nav class="nav topics-nav">
            <button id="back-to-grade5-from-columns" class="icon-btn" type="button" aria-label="Back to Grade 5" title="Back to Grade 5">⬅️</button>
          </nav>
          <button class="topic-btn" data-topic="multiply-decimals-whole-columns" role="listitem">Multiply decimals by whole numbers in columns</button>
          <button class="topic-btn" data-topic="multiply-1digit-columns" role="listitem">Multiply 1-digit decimals in columns</button>
          <button class="topic-btn" data-topic="multiply-2digit-columns" role="listitem">Multiply two-digit decimals in columns</button>
        </div>

        <div id="subsections-addition-advanced" class="cards hidden" role="list" aria-label="Addition advanced sub-sections">
          <nav class="nav topics-nav">
            <button id="back-to-grade5-from-addition" class="icon-btn" type="button" aria-label="Back to Grade 5" title="Back to Grade 5">⬅️</button>
          </nav>
          <button class="topic-btn" data-topic="missing-addends-3terms" role="listitem">Missing addends (3 terms)</button>
          <button class="topic-btn" data-topic="missing-addends-4plus" role="listitem">Missing addends (4+ terms)</button>
          <button class="topic-btn" data-topic="missing-addends-mental" role="listitem">Missing addends (mental math)</button>
          <button class="topic-btn" data-topic="adding-4numbers-columns" role="listitem">Adding 4 numbers in columns</button>
          <button class="topic-btn" data-topic="adding-5numbers-columns" role="listitem">Adding 5 numbers in columns</button>
          <button class="topic-btn" data-topic="adding-large-4addends" role="listitem">Adding large numbers, 4 addends</button>
          <button class="topic-btn" data-topic="adding-large-6addends" role="listitem">Adding large numbers, 6 addends</button>
        </div>

        <div id="subsections-subtraction-advanced" class="cards hidden" role="list" aria-label="Subtraction advanced sub-sections">
          <nav class="nav topics-nav">
            <button id="back-to-grade5-from-subtraction" class="icon-btn" type="button" aria-label="Back to Grade 5" title="Back to Grade 5">⬅️</button>
          </nav>
          <button class="topic-btn" data-topic="missing-minuend-subtrahend" role="listitem">Missing minuend or subtrahend problems</button>
          <button class="topic-btn" data-topic="subtract-large-columns" role="listitem">Subtract large numbers in columns</button>
        </div>

        <div id="subsections-word-problems-g5" class="cards hidden" role="list" aria-label="Word Problems sub-sections">
          <nav class="nav topics-nav">
            <button id="back-to-grade5-from-word" class="icon-btn" type="button" aria-label="Back to Grade 5" title="Back to Grade 5">⬅️</button>
          </nav>
          <button class="topic-btn" data-topic="word-problems-g5" role="listitem">Word Problems</button>
        </div>
      </section>

      <section id="question" class="screen hidden" aria-label="Question">
        <nav class="nav">
          <div style="display:flex;gap:8px;align-items:center;">
            <button id="back-to-grade-select-btn" class="icon-btn" type="button" aria-label="Choose Grade" title="Choose Grade">🏠</button>
            <button id="back-to-current-grade-btn" class="grade-nav" type="button" aria-label="Back to Current Grade" title="Back to Current Grade">
              <span class="grade-letter grade-none" aria-hidden="true"></span>
              <span class="grade-text">Back</span>
            </button>
          </div>
        </nav>

        <div id="timer-bar" class="timer-bar hidden" aria-label="Elapsed time">
          <span class="timer"><span class="timer-icon">⏱</span> <span id="timer-display">0:00</span></span>
        </div>

        <div id="mixed-controls" class="mixed-controls hidden" aria-hidden="true" style="margin:12px 0;">
          <div class="level-toggle" role="toolbar" aria-label="Mixed fractions level">
            <button id="level-1-btn" class="level-btn" data-level="1" aria-pressed="true">Level 1 — add 2 mixed fractions</button>
            <button id="level-2-btn" class="level-btn" data-level="2" aria-pressed="false">Level 2 — add 3 mixed fractions</button>
          </div>
        </div>

        <article class="question-card" aria-live="polite">
          <div id="problem" class="problem" aria-hidden="false"></div>
          <form id="answer-form" class="answer-form" aria-label="Answer form">
            <label for="answer-input" id="answer-label">Your answer</label>
            <input id="answer-input" inputmode="numeric" autocomplete="off" aria-labelledby="answer-label" required />
            <div class="controls">
              <button id="check-btn" type="submit" class="btn primary">Check</button>
              <button id="show-solution-btn" type="button" class="btn secondary hidden">Show solution</button>
              <button id="read-btn" type="button" class="btn primary hidden">I read it!</button>
              <button id="next-btn" type="button" class="btn primary">Next</button>
            </div>
          </form>

          <div id="feedback" class="feedback" aria-live="polite"></div>
          <div id="solution" class="solution hidden" aria-live="polite"></div>
        </article>
      </section>
    </main>

    <!-- US scores map -->
    <section id="state-scores-map" aria-label="Top math scores by US state" style="padding:20px;">
      <h2 style="text-align:center;margin-bottom:12px">Top Math Score by US State</h2>
      <div id="us-map" style="width:100%;height:480px;max-width:1100px;margin:0 auto;"></div>
    </section>

    <footer class="footer">
      <small>Built for classroom use.</small>
    </footer>
  </div>

  <!-- Score badge — always visible top-right -->
  <div id="score-badge" class="score-badge" aria-live="polite" aria-label="Score">
    <span class="score-label">Score</span>
    <span id="score-value" class="score-value">0</span>
  </div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script>
(async function () {
  // container must exist: <div id="us-map"></div>
  const container = document.getElementById('us-map');
  if (!container) return;

  // fetch scores and topojson in parallel
  const [scoresResp, usTopo] = await Promise.all([
    fetch('/api/state-scores').then(r => r.ok ? r.json() : {}).catch(() => ({})),
    fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(r => r.json())
  ]);

  let scores = scoresResp || {};

  // If KV is empty, show demo data so the map is visible for preview and testing.
  if (Object.keys(scores).length === 0) {
    console.warn('No state scores found; using demo values for preview.');
    scores = { 'NY': 8, 'CA': 7, 'TX': 6, 'FL': 5, 'WA': 7 };
  }

  // determine dynamic domain based on data
  const numericScores = Object.values(scores).map(s => Number(s)).filter(s => !isNaN(s));
  const maxFound = numericScores.length ? Math.max(...numericScores) : 10;
  const domainMax = Math.max(10, maxFound);

  // mapping FIPS -> postal code
  const fipsToState = {
    "01":"AL","02":"AK","04":"AZ","05":"AR","06":"CA","08":"CO","09":"CT","10":"DE","11":"DC","12":"FL",
    "13":"GA","15":"HI","16":"ID","17":"IL","18":"IN","19":"IA","20":"KS","21":"KY","22":"LA","23":"ME",
    "24":"MD","25":"MA","26":"MI","27":"MN","28":"MS","29":"MO","30":"MT","31":"NE","32":"NV","33":"NH",
    "34":"NJ","35":"NM","36":"NY","37":"NC","38":"ND","39":"OH","40":"OK","41":"OR","42":"PA","44":"RI",
    "45":"SC","46":"SD","47":"TN","48":"TX","49":"UT","50":"VT","51":"VA","53":"WA","54":"WV","55":"WI","56":"WY"
  };

  const width = container.clientWidth || 960;
  const height = 480;

  const svg = d3.select(container).append('svg')
    .attr('viewBox', `0 0 ${width} ${height}`)
    .style('width', '100%')
    .style('height', 'auto');

  const projection = d3.geoAlbersUsa().scale(1300).translate([487.5, 305]);
  const path = d3.geoPath().projection(projection);
  const states = topojson.feature(usTopo, usTopo.objects.states).features;

  const color = d3.scaleSequential().domain([0, domainMax]).interpolator(d3.interpolateYlOrRd);

  const tooltip = d3.select(container).append('div').attr('class', 'us-map-tooltip')
    .style('position','absolute').style('pointer-events','none').style('display','none')
    .style('background','rgba(0,0,0,0.75)').style('color','#fff').style('padding','6px 8px').style('border-radius','4px').style('font-size','13px');

  svg.append('g')
    .selectAll('path')
    .data(states)
    .join('path')
    .attr('d', path)
    .attr('fill', d => {
      const fips = String(d.id).padStart(2,'0');
      const code = fipsToState[fips];
      const sc = code ? scores[code] : undefined;
      return (sc !== undefined && !isNaN(sc)) ? color(sc) : '#efefef';
    })
    .attr('stroke', '#fff').attr('stroke-width', 0.6)
    .on('mousemove', (event, d) => {
      const fips = String(d.id).padStart(2,'0');
      const code = fipsToState[fips];
      const sc = (code && scores[code] !== undefined) ? scores[code] : 'No score';
      tooltip.style('display','block')
        .style('left',(event.pageX + 8)+'px').style('top',(event.pageY+8)+'px')
        .text(`${code || 'N/A'}: ${sc}`);
    })
    .on('mouseout', () => tooltip.style('display','none'));

  // small legend
  const legendWidth = 220;
  const defs = svg.append('defs');
  const linearGradient = defs.append('linearGradient').attr('id','legend-gradient');
  linearGradient.append('stop').attr('offset','0%').attr('stop-color', d3.interpolateYlOrRd(0));
  linearGradient.append('stop').attr('offset','100%').attr('stop-color', d3.interpolateYlOrRd(1));

  const legend = svg.append('g').attr('transform', `translate(${width - legendWidth - 20}, ${height - 60})`);
  legend.append('rect').attr('width', legendWidth).attr('height', 12).style('fill','url(#legend-gradient)').style('stroke','#ccc');
  const legendScale = d3.scaleLinear().domain([0,domainMax]).range([0, legendWidth]);
  const legendAxis = d3.axisBottom(legendScale).ticks(5).tickSize(6).tickFormat(d => String(d));
  legend.append('g').attr('transform', 'translate(0,12)').call(legendAxis).select('.domain').remove();
})();
</script>
<script src="generator.js"></script>
<script src="evaluator.js"></script>
<script src="app.js"></script>
</body>
</html>
